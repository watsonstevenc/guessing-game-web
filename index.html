<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Guessing Game</h1>
        <p>I'm thinking of a number between <strong>1 and 100</strong>.</p>

        <input type="number" id="guessInput" min="1" max="100" placeholder="?" />

        <button onclick="submitGuess()">Guess</button>
        <button onclick="resetGame()" style="background:#6b7280; margin-top:0.5rem;">New Game</button>

        <div id="message"></div>
        <div id="attempts"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
